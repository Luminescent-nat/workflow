name: 构建 macOS 安装包

# 推送 v 开头的 tag(如 v0.1.0)时自动构建,也可在 Actions 页面手动触发
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M 系列)
          - target: aarch64-apple-darwin
            arch: aarch64
          # Intel
          - target: x86_64-apple-darwin
            arch: x86_64
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo 构建
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用并发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "AI 开发控制台 ${{ github.ref_name }}"
          releaseBody: "macOS 安装包(.dmg)。aarch64 适用于 Apple Silicon,x86_64 适用于 Intel 芯片。"
          releaseDraft: false
          prerelease: false
